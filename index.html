<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hours Ledger</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="wrap">

  <header class="topbar">
    <div class="brand">
      <span class="brand-mark">▤</span>
      <span class="brand-name">Hours Ledger</span>
    </div>
    <nav class="tabs" id="tabs" hidden>
      <button class="tab active" data-view="attendance">My Hours</button>
      <button class="tab" data-view="bill">Bill Split</button>
      <button class="tab logout" id="logoutBtn">Log out</button>
    </nav>
  </header>

  <!-- LOGIN VIEW -->
  <section class="view active" id="view-login">
    <div class="card login-card">
      <p class="eyebrow">Enter your key</p>
      <h1>Who's logging in?</h1>
      <p class="muted">Use the secret key your household gave you.</p>
      <form id="loginForm" autocomplete="off">
        <input type="text" id="keyInput" placeholder="Secret key" autocomplete="off" spellcheck="false" required>
        <button type="submit" id="loginBtn">Continue</button>
      </form>
      <p class="error" id="loginError" hidden></p>
    </div>
  </section>

  <!-- ATTENDANCE VIEW -->
  <section class="view" id="view-attendance">
    <div class="card">
      <div class="card-head">
        <div>
          <p class="eyebrow" id="attMonth">—</p>
          <h1 id="attGreeting">My Hours</h1>
        </div>
        <button id="saveBtn" class="primary" disabled>Save changes</button>
      </div>
      <p class="muted">Enter hours (0–24) for each day. Unsaved days are marked.</p>
      <div class="table-wrap">
        <table class="ledger" id="attTable">
          <thead>
            <tr><th>Day</th><th>Hours</th><th></th></tr>
          </thead>
          <tbody id="attBody"></tbody>
        </table>
      </div>
      <p class="status" id="attStatus" aria-live="polite"></p>
    </div>
  </section>

  <!-- BILL VIEW -->
  <section class="view" id="view-bill">
    <div class="card receipt">
      <div class="receipt-head">
        <p class="eyebrow" id="billMonth">—</p>
        <h1>Bill Split</h1>
      </div>
      <div class="receipt-total">
        <span>Total bill</span>
        <span id="billTotal" class="mono">—</span>
      </div>
      <div class="dotted"></div>
      <table class="ledger receipt-table" id="billTable">
        <thead>
          <tr><th>Name</th><th>Hours</th><th>Share</th></tr>
        </thead>
        <tbody id="billBody"></tbody>
      </table>
      <div class="dotted"></div>
      <div class="receipt-total">
        <span>Total hours</span>
        <span id="billGrandHours" class="mono">—</span>
      </div>
      <p class="status" id="billStatus" aria-live="polite"></p>
      <button id="refreshBillBtn" class="ghost">Refresh</button>
    </div>
  </section>

</div>

<script src="app.js"></script>
</body>
</html>
